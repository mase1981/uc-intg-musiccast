version: '3.8'

services:
  musiccast-integration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uc-intg-musiccast
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/config
    environment:
      - UC_CONFIG_HOME=/config
      - UC_INTEGRATION_INTERFACE=0.0.0.0
      - UC_DISABLE_MDNS_PUBLISH=false
    labels:
      - "com.unfoldedcircle.integration=musiccast"
